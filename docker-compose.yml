services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: bakecity
      POSTGRES_USER: bakecity
      POSTGRES_PASSWORD: bakecity_dev
    # Host 5432 is taken by a system Postgres; publish on 5435 to avoid the clash.
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakecity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Host 6379 is taken by another project's Redis; publish on 6380.
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run backend in Docker Compose
  # api:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     DATABASE_URL: postgres://bakecity:bakecity_dev@postgres:5432/bakecity
  #     REDIS_URL: redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
