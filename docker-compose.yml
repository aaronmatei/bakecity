services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: bakecity
      POSTGRES_USER: bakecity
      POSTGRES_PASSWORD: bakecity_dev
    # Host 5432 is taken by a system Postgres; publish on 5435 to avoid the clash.
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakecity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Host 6379 is taken by another project's Redis; publish on 6380.
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Host 8080 is taken by another app (Apache/XAMPP); publish on 8090.
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: postgres://bakecity:bakecity_dev@postgres:5432/bakecity?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-change-me-9f3c1a
      # Object storage (Cloudflare R2 / S3). Set these in a repo-root .env file;
      # when the keys are blank the API falls back to a no-op stub presigner.
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-auto}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-bakecity}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
