name: bakecity
description: "BakeCity - Custom bakery marketplace app"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP and API
  dio: ^5.3.0
  web_socket_channel: ^2.4.0

  # Navigation
  go_router: ^12.0.0
  
  # Serialization
  freezed_annotation: ^2.4.0
  json_serializable: ^6.7.0
  
  # UI
  cached_network_image: ^3.2.0
  image_picker: ^1.0.0
  video_player: ^2.8.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.0
  
  # Notifications
  firebase_messaging: ^14.7.0
  
  # Date/Time
  intl: ^0.19.0
  table_calendar: ^3.0.0
  
  # Storage
  shared_preferences: ^2.2.0
  
  # Logging
  logger: ^2.0.0
  
  # Utils
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

